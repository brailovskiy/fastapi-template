# Refer for explanation to following link:
# https://github.com/evilmartians/lefthook/blob/master/docs/full_guide.md

# NOTE: use `lefthook install` when you make change in stages (groups like pre-commit, format, etc.)

pre-commit:
  commands:
    format:
      run: lefthook run format -n
    lint:
      run: lefthook run lint -n
    check-format:
      run: lefthook run check-format -n

pre-push:
  parallel: true
  commands:
    isort:
      glob: "*.py"
      run: isort --check-only {all_files}
    black:
      glob: "*.py"
      run: black --check {all_files}

format:
  piped: true
  parallel: false
  commands:
    # number prefix used to save ordering
    1_autoflake:
      glob: "*.py"
      run: autoflake --recursive --ignore-init-module-imports --remove-all-unused-imports --remove-unused-variables --in-place {staged_files}
    2_isort:
      glob: "*.py"
      run: isort --color --quiet {staged_files}
    3_black:
      glob: "*.py"
      run: black {staged_files}
    4_pyup_dirs:
      glob: "*.py"
      run: pyup_dirs --py311-plus {staged_files} | true
    5_black_check:
      glob: "*.py"
      run: black --check {staged_files}

lint:
  parallel: true
  commands:
    mypy:
      glob: "*.py"
      run: mypy app settings tests --namespace-packages  --show-traceback
    flake8:
      glob: "*.py"
      run: flake8 app settings tests

check-format:
  parallel: true
  commands:
    isort:
      glob: "*.py"
      run: isort --check-only {staged_files}
    black:
      glob: "*.py"
      run: black --check {staged_files}
